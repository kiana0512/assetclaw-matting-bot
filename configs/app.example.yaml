# app.example.yaml — Application configuration reference.
# Copy to app.yaml and customise. Currently informational only;
# environment variables in .env are the authoritative source.

gateway:
  host: "127.0.0.1"
  port: 7865

storage:
  data_dir: "E:/assetclaw-matting-bot/data"
  storage_dir: "E:/assetclaw-matting-bot/storage"
  log_dir: "E:/assetclaw-matting-bot/logs"

comfyui:
  url: "http://127.0.0.1:8188"
  workflow_path: "E:/assetclaw-matting-bot/workflows/matting_api.json"
  timeout_seconds: 600
  poll_interval_seconds: 2
  fake_mode: false

worker:
  id: "win3090-worker-01"
  gateway_base_url: "http://127.0.0.1:7865"
  poll_interval_seconds: 3
